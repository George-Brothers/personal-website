<title>ARCHIVE — Ski scene (side-view SMIL) — About page, pre-Last Chair v4</title>
<!--
  ============================================================
  ARCHIVED SNAPSHOT — DO NOT SERVE
  ============================================================
  This is the ORIGINAL side-view SVG/SMIL ski scene that lived in
  about.html's "◆ THE MOUNTAINS" section (the Elsewhere view),
  removed in branch fm/geb-lastchair-v4 when it was replaced by the
  top-down "Last Chair" modal easter egg.

  Kept here for trivial recoverability (git history also has it).
  This file is excluded from the Vercel upload via .vercelignore
  (the whole docs/ tree is ignored). It is a standalone reproduction:
  fonts/site.css are not wired up, so it will look unstyled in places,
  but the scene markup + its keyframes + its pausing JS are all here
  verbatim as they shipped.
  ============================================================
-->
<style>
/* --- keyframes that drove the side-view scene (from about.html <style>) --- */
/* ski scene — motion is SVG SMIL; CSS only for snow + parallax drift */
@keyframes drift{0%,100%{transform:translateX(0)}50%{transform:translateX(-10px)}}
@keyframes driftFast{0%,100%{transform:translateX(0)}50%{transform:translateX(-26px)}}
@keyframes snow1{0%{transform:translateY(-12px) translateX(0);opacity:0}10%{opacity:.9}100%{transform:translateY(320px) translateX(-30px);opacity:0}}
@keyframes snow2{0%{transform:translateY(-12px) translateX(0);opacity:0}10%{opacity:.55}100%{transform:translateY(320px) translateX(22px);opacity:0}}

/* --- responsive rules for the scene (from about.html <style>) --- */
@media (max-width:768px){
  .r-ski{height:210px !important}
  .r-ski .r-cap{left:16px !important;top:auto !important;bottom:12px !important;right:auto !important}
}
body{background:#181022;margin:0;padding:32px}
</style>
</head>

<!-- ===== PAUSING / REDUCED-MOTION JS (verbatim from js/about.js) ===== -->
<script>
(function () {
  'use strict';
  function gbReducedMotion(){return !!(window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches);}
  /* ================= Ski scene: pause SMIL offscreen / under reduced motion ================= */
  (function () {
    var skiScene = document.getElementById('ski-scene');
    var skiSvg = document.getElementById('ski-svg');
    if (!skiSvg || typeof skiSvg.pauseAnimations !== 'function') return;

    if (window.gbReducedMotion && window.gbReducedMotion()) {
      skiSvg.pauseAnimations();
      return;
    }
    if (skiScene && window.gbObserve) {
      window.gbObserve(skiScene, function () {
        skiSvg.unpauseAnimations();
      }, function () {
        skiSvg.pauseAnimations();
      });
    }
  })();
})();
</script>
